<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Light Pollution — Satellites in the Sky</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#030510;--card:#0a1020;--cyan:#5ce0d6;--blue:#6e8cff;--gold:#e8c170;--orange:#f6ad55;--red:#fc8181;--green:#6fcf97;--purple:#b794f4;--text:#c8d0e0;--dim:#6a7a8e;--muted:#3a4a5e;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;--serif:'Playfair Display',serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
canvas#sky{width:100%;height:50vh;display:block}
.controls{position:fixed;bottom:0;left:0;right:0;z-index:10;background:linear-gradient(to top,rgba(3,5,16,.95)70%,transparent);padding:16px 20px 20px}
.slider-row{max-width:500px;margin:0 auto;display:flex;align-items:center;gap:10px}
.slider-row label{font-family:var(--mono);font-size:.5rem;color:var(--dim);white-space:nowrap}
.slider-row input[type=range]{-webkit-appearance:none;flex:1;height:4px;border-radius:2px;background:linear-gradient(to right,#0a1428,#1a3050,#3a5060,#6a7060,#8a7050,#aa7040,#cc7030,#ee8020,#ff9930);outline:none}
.slider-row input::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 0 10px rgba(255,255,255,.3)}
.bortle-label{font-family:var(--mono);font-size:.7rem;font-weight:500;color:var(--gold);text-align:center;margin-bottom:4px}
.bortle-desc{font-size:.68rem;color:var(--dim);text-align:center;margin-bottom:8px;max-width:500px;margin-left:auto;margin-right:auto}

.info{position:fixed;top:0;left:0;right:0;z-index:10;background:linear-gradient(to bottom,rgba(3,5,16,.9)70%,transparent);padding:14px 20px 30px;text-align:center}
.info h1{font-family:var(--serif);font-size:clamp(1.2rem,3vw,1.8rem);font-weight:800;margin-bottom:4px}
.info h1 span{color:var(--gold)}

.vis-grid{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;max-width:500px;margin:6px auto 0}
.vis-item{font-family:var(--mono);font-size:.4rem;padding:3px 8px;border-radius:3px;transition:all .3s}
.vis-item.visible{background:rgba(111,207,151,0.1);color:var(--green)}
.vis-item.faint{background:rgba(232,193,112,0.06);color:var(--gold);opacity:.5}
.vis-item.hidden{background:rgba(252,129,129,0.04);color:var(--red);opacity:.25;text-decoration:line-through}

/* === BRANDING + i18n === */
@import url('https://fonts.googleapis.com/css2?family=Amiri&display=swap');
.bismillah-bar{text-align:center;padding:6px 0 2px;font-family:'Amiri',serif;font-size:.72rem;color:rgba(232,193,112,.2);letter-spacing:.02em;position:relative;z-index:100;pointer-events:none;line-height:1}
.brand-header{position:fixed;top:8px;left:8px;z-index:999;display:flex;align-items:center;gap:6px}
.brand-header img{width:22px;height:22px;filter:invert(1);opacity:.2;transition:opacity .2s}
.brand-header img:hover{opacity:.5}
.brand-footer{text-align:center;padding:16px 10px 12px;position:relative;z-index:10}
.brand-footer img{height:32px;filter:invert(1);opacity:.15;margin-bottom:4px}
.brand-footer a{font-family:'JetBrains Mono',monospace;font-size:.45rem;color:rgba(106,122,142,.4);text-decoration:none;letter-spacing:.04em;display:block}
.brand-footer a:hover{color:rgba(106,122,142,.6)}
.lang-sw{position:fixed;top:8px;right:8px;z-index:999;display:flex;gap:2px}
.lang-sw button{font-family:'JetBrains Mono',monospace;font-size:.4rem;padding:3px 7px;border-radius:4px;border:1px solid rgba(110,140,255,.08);background:rgba(10,16,32,.7);color:rgba(200,208,224,.35);cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
.lang-sw button:hover{color:rgba(200,208,224,.6)}
.lang-sw button.active{background:rgba(110,140,255,.08);color:rgba(200,208,224,.7);border-color:rgba(110,140,255,.15)}
[data-lang="ar"] .lang-sw{left:8px;right:auto}
[data-lang="ar"] .brand-header{left:auto;right:8px}

</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#030510">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="apple-touch-icon" href="icon-192x192.png">
</head>
<body>
<div class="bismillah-bar" aria-label="Bismillah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</div>
<div class="brand-header"><a href="aa-portal.html"><img src="logo_icon_sm.png" alt="Workshop DIY"></a></div>
<div class="lang-sw"><button onclick="setLang('en')" id="btn-en" class="active">EN</button><button onclick="setLang('fr')" id="btn-fr">FR</button><button onclick="setLang('ar')" id="btn-ar">عر</button></div>

<canvas id="sky"></canvas>

<div class="info">
  <h1 data-en="Light" data-fr="Lumière" data-ar="الضوء">Light <span><span data-en="Pollution" data-fr="Pollution" data-ar="التلوث">Pollution</span></span></h1>
  <div class="vis-grid" id="visGrid"></div>
</div>

<div class="controls">
  <div class="bortle-label" id="bLabel" data-en="Bortle 5 — Suburban Sky" data-fr="Bortle 5 — Ciel de banlieue" data-ar="بورتل ٥ — سماء ضاحية">Bortle 5 — Suburban Sky</div>
  <div class="bortle-desc" id="bDesc">Milky Way faintly visible near zenith. ~200 stars visible. Satellites easily spotted.</div>
  <div class="slider-row">
    <label data-en="🌌 Dark" data-fr="🌌 Sombre" data-ar="🌌 مظلم">🌌 Dark</label>
    <input type="range" id="bortle" min="1" max="9" value="5" step="1">
    <label data-en="🏙️ Bright" data-fr="🏙️ Lumineux" data-ar="🏙️ ساطع">🏙️ Bright</label>
  </div>
</div>

<script>
const cv=document.getElementById('sky'),cx=cv.getContext('2d'),P=Math.PI*2;
let W,H;function rs(){const d=devicePixelRatio||1;W=innerWidth;H=innerHeight;cv.width=W*d;cv.height=H*d;cv.style.width=W+'px';cv.style.height=H+'px';cx.setTransform(d,0,0,d,0,0)}
rs();addEventListener('resize',rs);

const BORTLE=[
  {n:1,name:'Excellent Dark Site',name_fr:'Site sombre excellent',name_ar:'موقع مظلم ممتاز',desc:'Zodiacal light, gegenschein, zodiacal band all visible. ~7,000 stars. Milky Way casts shadows.',stars:7000,mw:1,sat:1,lim:7.6},
  {n:2,name:'Typical Dark Site',name_fr:'Site sombre typique',name_ar:'موقع مظلم نموذجي',desc:'Zodiacal light obvious. Milky Way highly structured. ~5,000 stars. M33 visible naked eye.',stars:5000,mw:.9,sat:1,lim:7.1},
  {n:3,name:'Rural Sky',name_fr:'Ciel rural',name_ar:'سماء ريفية',desc:'Some light pollution low on horizon. Milky Way still impressive. ~4,000 stars.',stars:4000,mw:.7,sat:1,lim:6.6},
  {n:4,name:'Rural/Suburban',name_fr:'Rural/Banlieue',name_ar:'ريفي/ضاحية',desc:'Light domes visible over cities. Milky Way visible but lacks detail. ~2,500 stars.',stars:2500,mw:.4,sat:1,lim:6.2},
  {n:5,name:'Suburban Sky',name_fr:'Ciel de banlieue',name_ar:'سماء ضاحية',desc:'Milky Way faint near zenith. Only brightest parts visible. ~1,500 stars. Most common clear-sky view.',stars:1500,mw:.15,sat:.9,lim:5.6},
  {n:6,name:'Bright Suburban',name_fr:'Banlieue lumineuse',name_ar:'ضاحية مضيئة',desc:'Milky Way only visible in best conditions. ~500 stars. Sky glow whitish-gray.',stars:500,mw:.04,sat:.7,lim:5.1},
  {n:7,name:'Suburban/Urban',name_fr:'Banlieue/Urbain',name_ar:'ضاحية/مدينة',desc:'Sky distinctly gray/white. Only brightest stars. ~200 stars. Milky Way invisible.',stars:200,mw:0,sat:.5,lim:4.6},
  {n:8,name:'City Sky',name_fr:'Ciel urbain',name_ar:'سماء المدينة',desc:'Sky glows white/orange. ~100 stars visible. Constellations incomplete. Planets visible.',stars:100,mw:0,sat:.3,lim:4.1},
  {n:9,name:'Inner City',name_fr:'Centre-ville',name_ar:'وسط المدينة',desc:'Only Moon, planets, and ~30 brightest stars. Sky orange/bright. Magnitude 3 or brighter.',stars:30,mw:0,sat:.1,lim:3.5},
];

const OBJECTS=[
  {name:'Brightest Stars',minB:1,maxB:9,type:'visible'},
  {name:'Planets',minB:1,maxB:9,type:'visible'},
  {name:'ISS',minB:1,maxB:8,type:'visible'},
  {name:'Bright Satellites',minB:1,maxB:7,type:'visible'},
  {name:'Constellations',minB:1,maxB:7,type:'visible'},
  {name:'Starlink Train',minB:1,maxB:6,type:'visible'},
  {name:'Faint Satellites',minB:1,maxB:5,type:'faint'},
  {name:'Milky Way',minB:1,maxB:5,type:'faint'},
  {name:'Andromeda (M31)',minB:1,maxB:4,type:'faint'},
  {name:'Zodiacal Light',minB:1,maxB:2,type:'faint'},
  {name:'Meteor Showers',minB:1,maxB:5,type:'faint'},
  {name:'Double Stars',minB:1,maxB:4,type:'faint'},
  {name:'Star Clusters',minB:1,maxB:3,type:'faint'},
  {name:'Nebulae',minB:1,maxB:2,type:'faint'},
];

let bortle=5;
const stars=[];for(let i=0;i<2000;i++){
  stars.push({x:Math.random(),y:Math.random(),mag:Math.random()*7+.5,tw:Math.random()*P});
}
const satData=[];for(let i=0;i<8;i++){
  satData.push({x:Math.random(),y:Math.random()*.6,dx:.0002+Math.random()*.0003,bright:Math.random()*4+1});
}

function updateUI(){
  const b=BORTLE[bortle-1];
  document.getElementById('bLabel').textContent=`Bortle ${b.n} — ${b.name}`;
  document.getElementById('bDesc').textContent=`${b.desc} Limiting magnitude: ${b.lim}`;
  
  const grid=document.getElementById('visGrid');
  grid.innerHTML=OBJECTS.map(o=>{
    const vis=bortle>=o.minB&&bortle<=o.maxB;
    const faint=vis&&bortle>=o.maxB-1;
    return`<span class="vis-item ${vis?(faint?'faint':'visible'):'hidden'}">${vis?'✓':'✗'} ${o.name}</span>`;
  }).join('');
}

function render(){
  cx.clearRect(0,0,W,H);
  const b=BORTLE[bortle-1];
  
  // Sky background — lighter with more pollution
  const skyBright=((bortle-1)/8);
  const r=Math.round(3+skyBright*40),g=Math.round(5+skyBright*30),bl=Math.round(16+skyBright*20);
  cx.fillStyle=`rgb(${r},${g},${bl})`;cx.fillRect(0,0,W,H);
  
  // Light dome glow from bottom
  if(bortle>3){
    const glow=cx.createRadialGradient(W/2,H*1.2,0,W/2,H*1.2,H);
    const intensity=(bortle-3)/6*.3;
    glow.addColorStop(0,`rgba(180,140,80,${intensity})`);
    glow.addColorStop(.5,`rgba(120,90,50,${intensity*.3})`);
    glow.addColorStop(1,'transparent');
    cx.fillStyle=glow;cx.fillRect(0,0,W,H);
  }
  
  // Milky Way
  if(b.mw>0){
    cx.save();cx.translate(W/2,H/2);cx.rotate(-.4);
    const mwGrad=cx.createLinearGradient(-W*.6,0,W*.6,0);
    mwGrad.addColorStop(0,'transparent');
    mwGrad.addColorStop(.3,`rgba(200,210,230,${b.mw*.02})`);
    mwGrad.addColorStop(.5,`rgba(200,210,230,${b.mw*.04})`);
    mwGrad.addColorStop(.7,`rgba(200,210,230,${b.mw*.02})`);
    mwGrad.addColorStop(1,'transparent');
    cx.fillStyle=mwGrad;cx.fillRect(-W*.7,-H*.15,W*1.4,H*.3);
    cx.restore();
  }
  
  // Stars
  const t=Date.now()*.001;
  const visibleMag=b.lim;
  for(const s of stars){
    if(s.mag>visibleMag)continue;
    const brightness=Math.max(0,(visibleMag-s.mag)/visibleMag);
    const twinkle=.7+.3*Math.sin(t*2+s.tw);
    const alpha=brightness*twinkle*.5;
    if(alpha<.01)continue;
    const size=Math.max(.3,(visibleMag-s.mag)/visibleMag*2);
    cx.beginPath();cx.arc(s.x*W,s.y*H,size,0,P);
    cx.fillStyle=`rgba(220,225,240,${alpha})`;cx.fill();
  }
  
  // Satellites
  for(const s of satData){
    if(s.bright>visibleMag*b.sat)continue;
    s.x=(s.x+s.dx)%1.2;if(s.x>1.1)s.x=-0.1;
    const alpha=Math.max(0,(visibleMag*b.sat-s.bright)/(visibleMag*b.sat))*.4;
    cx.beginPath();cx.arc(s.x*W,s.y*H,1.5,0,P);
    cx.fillStyle=`rgba(92,224,214,${alpha})`;cx.fill();
  }
  
  // Horizon line
  cx.beginPath();cx.moveTo(0,H*.88);
  for(let x=0;x<=W;x+=20){cx.lineTo(x,H*.88+Math.sin(x*.01)*5)}
  cx.lineTo(W,H);cx.lineTo(0,H);cx.closePath();
  cx.fillStyle=`rgba(${10+bortle*4},${15+bortle*3},${25+bortle*2},0.9)`;cx.fill();
  
  // City silhouette for high bortle
  if(bortle>5){
    for(let x=0;x<W;x+=30+Math.random()*20){
      const bh=10+Math.random()*(bortle*4);
      cx.fillStyle=`rgba(${20+bortle*3},${20+bortle*2},${30+bortle*2},0.8)`;
      cx.fillRect(x,H*.88-bh,15+Math.random()*10,bh);
      // Windows
      if(bortle>6){
        for(let wy=H*.88-bh+4;wy<H*.88-2;wy+=5){
          if(Math.random()>.4){
            cx.fillStyle=`rgba(255,220,150,${.05+Math.random()*.1})`;
            cx.fillRect(x+3,wy,3,2);
          }
        }
      }
    }
  }
  
  requestAnimationFrame(render);
}

document.getElementById('bortle').addEventListener('input',e=>{bortle=+e.target.value;updateUI()});
updateUI();render();
</script>
<div class="brand-footer"><img src="logo_wdiy.svg" alt="Workshop DIY"><a href="https://workshop-diy.org" target="_blank" rel="noopener">workshop-diy.org</a></div>
<script>
/* i18n engine */
const T={en:{title:'Light Pollution',project:'Satellites in the Sky'},fr:{title:'Pollution Lumineuse',project:'Satellites dans le Ciel'},ar:{title:'التلوث الضوئي',project:'أقمار في السماء'}};
let curLang='en';function t(k){return(T[curLang]&&T[curLang][k])||T.en[k]||k}
function tl(o,f){return(curLang!=='en'&&o[f+'_'+curLang])||o[f]||''}
function setLang(l){curLang=l;const h=document.documentElement;h.setAttribute('data-lang',l);h.dir=l==='ar'?'rtl':'ltr';h.lang=l;document.querySelectorAll('.lang-sw button').forEach(b=>b.classList.remove('active'));const ab=document.getElementById('btn-'+l);if(ab)ab.classList.add('active');document.title=t('title')+' — '+t('project');document.querySelectorAll('[data-en]').forEach(el=>{const v=el.getAttribute('data-'+l);if(v)el.textContent=v;else{const fb=el.getAttribute('data-en');if(fb)el.textContent=fb}});try{localStorage.setItem('aa-lang',l)}catch(e){};if(typeof render==='function')try{render()}catch(e){}}
try{const s=localStorage.getItem('aa-lang');if(s)setLang(s)}catch(e){}
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}</script>
</body>
</html>
