<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Journal — Satellites in the Sky</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#030510;--card:#0a1020;--blue:#6e8cff;--cyan:#5ce0d6;--gold:#e8c170;--purple:#b794f4;--green:#6fcf97;--orange:#f6ad55;--red:#fc8181;--text:#c8d0e0;--text-dim:#6a7a8e;--text-muted:#3a4a5e;--font:'Outfit',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--serif:'Playfair Display',Georgia,serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

header{text-align:center;padding:50px 20px 30px}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(183,148,244,0.06);border:1px solid rgba(183,148,244,0.1);border-radius:50px;padding:6px 16px;font-size:.65rem;color:var(--purple);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px}
header h1{font-family:var(--serif);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;margin-bottom:8px}
header h1 span{color:var(--purple)}
header p{font-size:.85rem;color:var(--text-dim);max-width:480px;margin:0 auto}

.main{max-width:900px;margin:0 auto;padding:0 20px 60px;display:grid;grid-template-columns:280px 1fr;gap:16px}
@media(max-width:700px){.main{grid-template-columns:1fr}}

/* Stats sidebar */
.sidebar{display:flex;flex-direction:column;gap:12px}
.stat-card{background:var(--card);border:1px solid rgba(110,140,255,0.06);border-radius:12px;padding:16px}
.stat-card h3{font-family:var(--mono);font-size:.5rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.stat-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.02)}
.stat-row:last-child{border:none}
.stat-row .srl{font-size:.72rem;color:var(--text-dim)}.stat-row .srv{font-family:var(--mono);font-size:.72rem;font-weight:500}

.achievements{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ach{background:rgba(255,255,255,0.02);border-radius:8px;padding:8px;text-align:center;opacity:.4;transition:opacity .3s}
.ach.earned{opacity:1}
.ach .ai{font-size:1.2rem;margin-bottom:2px}
.ach .at{font-size:.5rem;color:var(--text-dim);font-weight:600}

.export-btn{font-family:var(--mono);font-size:.52rem;padding:8px;border-radius:6px;border:1px solid rgba(110,140,255,0.15);background:rgba(110,140,255,0.04);color:var(--blue);cursor:pointer;width:100%;transition:all .3s;margin-top:4px}
.export-btn:hover{background:rgba(110,140,255,0.1)}

/* Journal entries */
.journal{display:flex;flex-direction:column;gap:10px}
.j-date{font-family:var(--serif);font-size:.88rem;font-weight:700;color:var(--gold);margin-top:12px;margin-bottom:4px}
.j-entry{background:var(--card);border:1px solid rgba(110,140,255,0.06);border-radius:12px;padding:14px 16px;transition:all .3s}
.j-entry:hover{border-color:rgba(110,140,255,0.12)}
.j-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.j-time{font-family:var(--mono);font-size:.6rem;color:var(--text-muted)}
.j-sat{font-size:.88rem;font-weight:600;color:#fff;display:flex;align-items:center;gap:6px}
.j-sat .ji{font-size:1rem}
.j-details{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.j-detail{background:rgba(255,255,255,0.02);border-radius:5px;padding:4px 6px;text-align:center}
.j-detail .jdl{font-family:var(--mono);font-size:.36rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
.j-detail .jdv{font-family:var(--mono);font-size:.58rem;font-weight:500;color:var(--cyan)}
.j-note{font-size:.72rem;color:var(--text-dim);line-height:1.45;font-style:italic;padding-top:6px;border-top:1px solid rgba(255,255,255,0.02)}
.j-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.j-tag{font-family:var(--mono);font-size:.4rem;padding:2px 6px;border-radius:3px;letter-spacing:.04em}

footer{text-align:center;padding:30px 20px;font-size:.6rem;color:var(--text-muted)}

/* === BRANDING + i18n === */
@import url('https://fonts.googleapis.com/css2?family=Amiri&display=swap');
.bismillah-bar{text-align:center;padding:6px 0 2px;font-family:'Amiri',serif;font-size:.72rem;color:rgba(232,193,112,.2);letter-spacing:.02em;position:relative;z-index:100;pointer-events:none;line-height:1}
.brand-header{position:fixed;top:8px;left:8px;z-index:999;display:flex;align-items:center;gap:6px}
.brand-header img{width:22px;height:22px;filter:invert(1);opacity:.2;transition:opacity .2s}
.brand-header img:hover{opacity:.5}
.brand-footer{text-align:center;padding:16px 10px 12px;position:relative;z-index:10}
.brand-footer img{height:32px;filter:invert(1);opacity:.15;margin-bottom:4px}
.brand-footer a{font-family:'JetBrains Mono',monospace;font-size:.45rem;color:rgba(106,122,142,.4);text-decoration:none;letter-spacing:.04em;display:block}
.brand-footer a:hover{color:rgba(106,122,142,.6)}
.lang-sw{position:fixed;top:8px;right:8px;z-index:999;display:flex;gap:2px}
.lang-sw button{font-family:'JetBrains Mono',monospace;font-size:.4rem;padding:3px 7px;border-radius:4px;border:1px solid rgba(110,140,255,.08);background:rgba(10,16,32,.7);color:rgba(200,208,224,.35);cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
.lang-sw button:hover{color:rgba(200,208,224,.6)}
.lang-sw button.active{background:rgba(110,140,255,.08);color:rgba(200,208,224,.7);border-color:rgba(110,140,255,.15)}
[data-lang="ar"] .lang-sw{left:8px;right:auto}
[data-lang="ar"] .brand-header{left:auto;right:8px}

</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#030510">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="apple-touch-icon" href="icon-192x192.png">
</head>
<body>
<div class="bismillah-bar" aria-label="Bismillah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</div>
<div class="brand-header"><a href="aa-portal.html"><img src="logo_icon_sm.png" alt="Workshop DIY"></a></div>
<div class="lang-sw"><button onclick="setLang('en')" id="btn-en" class="active">EN</button><button onclick="setLang('fr')" id="btn-fr">FR</button><button onclick="setLang('ar')" id="btn-ar">عر</button></div>


<header>
  <div class="badge"><span data-en="📓 Personal Log" data-fr="📓 Journal personnel" data-ar="📓 السجل الشخصي">📓 Personal Log</span></div>
  <h1 data-en="My Sky" data-fr="Mon ciel" data-ar="سمائي">My Sky <span><span data-en="Journal" data-fr="Journal" data-ar="المفكرة">Journal</span></span></h1>
  <p>Your personal satellite observation log. Every pass recorded. Every sighting logged. Your own dataset about the sky above you.</p>
</header>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="journal" id="journal"></div>
</div>

<footer><span data-en="Part of the Satellites in the Sky project" data-fr="Partie du projet Satellites dans le Ciel" data-ar="جزء من مشروع أقمار في السماء">Part of the Satellites in the Sky project</span></footer>

<script>
// Generate realistic journal entries
const SATS=[
  {name:'ISS (ZARYA)',name_fr:'ISS (ZARYA)',name_ar:'م.ف.د (زاريا)',icon:'🏗️',type:'Station',brightness:-3.8,alt:408,speed:7.66,tags:['station','crewed','bright']},
  {name:'Starlink-4721',icon:'📶',type:'Comms',brightness:4.2,alt:550,speed:7.59,tags:['starlink','constellation']},
  {name:'Starlink-5103',icon:'📶',type:'Comms',brightness:4.8,alt:550,speed:7.59,tags:['starlink','constellation']},
  {name:'Hubble',name_fr:'Hubble',name_ar:'هابل',icon:'🔭',type:'Science',brightness:1.5,alt:547,speed:7.59,tags:['science','telescope']},
  {name:'NOAA-20',name_fr:'NOAA-20',name_ar:'NOAA-20',icon:'🌦️',type:'Weather',brightness:4.0,alt:833,speed:7.45,tags:['weather','polar']},
  {name:'Tiangong',name_fr:'Tiangong',name_ar:'تيانغونغ',icon:'🇨🇳',type:'Station',brightness:-1.5,alt:390,speed:7.68,tags:['station','crewed']},
  {name:'COSMOS 2558',name_fr:'COSMOS 2558',name_ar:'كوسموس ٢٥٥٨',icon:'⚠️',type:'Military',brightness:5.5,alt:426,speed:7.65,tags:['military','classified']},
  {name:'CZ-5B R/B',icon:'🚀',type:'Debris',brightness:3.0,alt:310,speed:7.72,tags:['debris','tumbling']},
  {name:'Landsat 9',name_fr:'Landsat 9',name_ar:'لاندسات ٩',icon:'📸',type:'Imaging',brightness:5.0,alt:705,speed:7.50,tags:['imaging','sun-sync']},
];

const NOTES=[
  'Bright steady pass west to east. Visible for about 4 minutes.',
  'Caught this one just above the treeline. Quick pass, barely visible.',
  'Beautiful golden light, unmistakable. Best pass this week.',
  'Part of a Starlink train — 3 satellites visible in a row.',
  'Dim but steady. North to south polar orbit confirmed.',
  'Tumbling — visible flashing as it crossed overhead.',
  'High elevation pass, almost directly overhead. Impressive brightness.',
  'Brief window between clouds. Lucky catch.',
  'Showed this one to the kids. They were amazed.',
  'Recorded with binoculars. Could see it change brightness near shadow.',
];

function generateEntries(){
  const entries=[];
  const now=new Date();
  for(let d=0;d<14;d++){
    const date=new Date(now);date.setDate(date.getDate()-d);
    const nPasses=1+Math.floor(Math.random()*4);
    for(let p=0;p<nPasses;p++){
      const sat=SATS[Math.floor(Math.random()*SATS.length)];
      const hour=5+Math.floor(Math.random()*3);// Dawn or dusk
      const isDusk=Math.random()>.4;
      const h=isDusk?18+Math.floor(Math.random()*3):hour;
      const m=Math.floor(Math.random()*60);
      const maxEl=10+Math.floor(Math.random()*75);
      const dur=60+Math.floor(Math.random()*240);
      const dir=['NW→SE','W→E','SW→NE','N→S','S→N','NE→SW'][Math.floor(Math.random()*6)];
      entries.push({
        date:new Date(date.getFullYear(),date.getMonth(),date.getDate(),h,m),
        sat,maxEl,dur,dir,
        note:NOTES[Math.floor(Math.random()*NOTES.length)],
        brightness:sat.brightness+(Math.random()-.5)*1.5
      });
    }
  }
  return entries.sort((a,b)=>b.date-a.date);
}

const entries=generateEntries();

// Stats
const totalObs=entries.length;
const uniqueSats=[...new Set(entries.map(e=>e.sat.name))].length;
const brightestEntry=entries.reduce((a,b)=>a.brightness<b.brightness?a:b);
const highestEl=entries.reduce((a,b)=>a.maxEl>b.maxEl?a:b);
const issCount=entries.filter(e=>e.sat.name.includes('ISS')).length;
const debrisCount=entries.filter(e=>e.sat.type==='Debris').length;
const starlinkCount=entries.filter(e=>e.sat.name.includes('Starlink')).length;

// Render sidebar
document.getElementById('sidebar').innerHTML=`
  <div class="stat-card">
    <h3>📊 Summary (14 Days)</h3>
    <div class="stat-row"><span class="srl">Total observations</span><span class="srv" style="color:var(--cyan)">${totalObs}</span></div>
    <div class="stat-row"><span class="srl">Unique satellites</span><span class="srv" style="color:var(--blue)">${uniqueSats}</span></div>
    <div class="stat-row"><span class="srl">ISS sightings</span><span class="srv" style="color:var(--gold)">${issCount}</span></div>
    <div class="stat-row"><span class="srl">Starlink passes</span><span class="srv" style="color:var(--cyan)">${starlinkCount}</span></div>
    <div class="stat-row"><span class="srl">Debris tracked</span><span class="srv" style="color:var(--red)">${debrisCount}</span></div>
  </div>
  <div class="stat-card">
    <h3>🏆 Personal Records</h3>
    <div class="stat-row"><span class="srl">Brightest seen</span><span class="srv" style="color:var(--orange)">mag ${brightestEntry.brightness.toFixed(1)}</span></div>
    <div class="stat-row"><span class="srl">…which was</span><span class="srv" style="color:var(--gold)">${brightestEntry.sat.name}</span></div>
    <div class="stat-row"><span class="srl">Highest pass</span><span class="srv" style="color:var(--green)">${highestEl.maxEl}° el</span></div>
    <div class="stat-row"><span class="srl">Avg per night</span><span class="srv" style="color:var(--cyan)">${(totalObs/14).toFixed(1)}</span></div>
  </div>
  <div class="stat-card">
    <h3>🎖️ Achievements</h3>
    <div class="achievements">
      <div class="ach ${issCount>0?'earned':''}"><div class="ai">🏗️</div><div class="at">ISS Spotter</div></div>
      <div class="ach ${totalObs>=10?'earned':''}"><div class="ai">👀</div><div class="at">10 Sightings</div></div>
      <div class="ach ${uniqueSats>=5?'earned':''}"><div class="ai">🌟</div><div class="at">5 Unique Sats</div></div>
      <div class="ach ${debrisCount>0?'earned':''}"><div class="ai">⚠️</div><div class="at">Debris Tracker</div></div>
      <div class="ach ${starlinkCount>=3?'earned':''}"><div class="ai">📶</div><div class="at">Train Spotter</div></div>
      <div class="ach ${highestEl.maxEl>70?'earned':''}"><div class="ai">⬆️</div><div class="at">Zenith Pass</div></div>
      <div class="ach ${totalObs>=20?'earned':''}"><div class="ai">🔭</div><div class="at">20 Sightings</div></div>
      <div class="ach ${brightestEntry.brightness<-2?'earned':''}"><div class="ai">✨</div><div class="at">Mag -2 Club</div></div>
    </div>
  </div>
  <button class="export-btn" onclick="exportCSV()">💾 Export CSV</button>
  <button class="export-btn" onclick="exportJSON()">📋 Export JSON</button>
`;

// Render journal
const journal=document.getElementById('journal');
let lastDate='';
const tagColors={station:'background:rgba(232,193,112,0.1);color:var(--gold)',starlink:'background:rgba(92,224,214,0.1);color:var(--cyan)',science:'background:rgba(183,148,244,0.1);color:var(--purple)',weather:'background:rgba(110,140,255,0.1);color:var(--blue)',military:'background:rgba(252,129,129,0.1);color:var(--red)',debris:'background:rgba(252,129,129,0.1);color:var(--red)',crewed:'background:rgba(232,193,112,0.08);color:var(--gold)',bright:'background:rgba(246,173,85,0.1);color:var(--orange)',imaging:'background:rgba(246,173,85,0.08);color:var(--orange)',constellation:'background:rgba(92,224,214,0.08);color:var(--cyan)',polar:'background:rgba(110,140,255,0.08);color:var(--blue)',tumbling:'background:rgba(252,129,129,0.08);color:var(--red)','sun-sync':'background:rgba(110,140,255,0.08);color:var(--blue)',telescope:'background:rgba(183,148,244,0.08);color:var(--purple)',classified:'background:rgba(252,129,129,0.08);color:var(--red)'};

entries.forEach(e=>{
  const ds=e.date.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  if(ds!==lastDate){journal.innerHTML+=`<div class="j-date">${ds}</div>`;lastDate=ds}
  
  const ts=e.date.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  journal.innerHTML+=`
    <div class="j-entry">
      <div class="j-head">
        <div class="j-sat"><span class="ji">${e.sat.icon}</span>${e.sat.name}</div>
        <div class="j-time">${ts}</div>
      </div>
      <div class="j-details">
        <div class="j-detail"><div class="jdl">Max El</div><div class="jdv">${e.maxEl}°</div></div>
        <div class="j-detail"><div class="jdl">Mag</div><div class="jdv">${e.brightness.toFixed(1)}</div></div>
        <div class="j-detail"><div class="jdl">Duration</div><div class="jdv">${e.dur}s</div></div>
        <div class="j-detail"><div class="jdl">Direction</div><div class="jdv">${e.dir}</div></div>
      </div>
      <div class="j-note">"${e.note}"</div>
      <div class="j-tags">${e.sat.tags.map(t=>`<span class="j-tag" style="${tagColors[t]||''}">${t}</span>`).join('')}</div>
    </div>`;
});

function exportCSV(){
  let csv='Date,Time,Satellite,Type,Brightness,MaxElevation,Duration(s),Direction,Note\n';
  entries.forEach(e=>{
    csv+=`${e.date.toISOString().split('T')[0]},${e.date.toTimeString().split(' ')[0]},${e.sat.name},${e.sat.type},${e.brightness.toFixed(1)},${e.maxEl},${e.dur},${e.dir},"${e.note}"\n`;
  });
  const b=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download='sky-journal.csv';a.click();
}
function exportJSON(){
  const data=entries.map(e=>({date:e.date.toISOString(),satellite:e.sat.name,type:e.sat.type,brightness:+e.brightness.toFixed(1),maxElevation:e.maxEl,duration:e.dur,direction:e.dir,note:e.note}));
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download='sky-journal.json';a.click();
}
</script>
<div class="brand-footer"><img src="logo_wdiy.svg" alt="Workshop DIY"><a href="https://workshop-diy.org" target="_blank" rel="noopener">workshop-diy.org</a></div>
<script>
/* i18n engine */
const T={en:{title:'Sky Journal',project:'Satellites in the Sky'},fr:{title:'Journal du Ciel',project:'Satellites dans le Ciel'},ar:{title:'مفكرة السماء',project:'أقمار في السماء'}};
let curLang='en';function t(k){return(T[curLang]&&T[curLang][k])||T.en[k]||k}
function tl(o,f){return(curLang!=='en'&&o[f+'_'+curLang])||o[f]||''}
function setLang(l){curLang=l;const h=document.documentElement;h.setAttribute('data-lang',l);h.dir=l==='ar'?'rtl':'ltr';h.lang=l;document.querySelectorAll('.lang-sw button').forEach(b=>b.classList.remove('active'));const ab=document.getElementById('btn-'+l);if(ab)ab.classList.add('active');document.title=t('title')+' — '+t('project');document.querySelectorAll('[data-en]').forEach(el=>{const v=el.getAttribute('data-'+l);if(v)el.textContent=v;else{const fb=el.getAttribute('data-en');if(fb)el.textContent=fb}});try{localStorage.setItem('aa-lang',l)}catch(e){}}
try{const s=localStorage.getItem('aa-lang');if(s)setLang(s)}catch(e){}
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}</script>
</body>
</html>
